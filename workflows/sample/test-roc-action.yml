name: Test ROC Agent (Docker) lol
on:
    workflow_dispatch:

jobs:
    test-roc-agent:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Start ROC Agent (Docker)
              id: roc-start
              uses: Securable-ai/roc-agent@v0.0.0
              with:
                  server_url: https://api.codexsecurity.io/graphql
                  api_key: ${{ secrets.ROC_API_KEY }}
                  project_name: ${{ github.repository }}
                  print_only: false
                  debug: true

            - name: Simulate Network Traffic
              run: |
                  echo "ROC process started with PID: ${{ steps.roc-start.outputs.roc_pid }}"
                  echo "Waiting for ROC to initialize..."
                  sleep 10
                  echo "Generating curl traffic..."
                  curl -s -X POST "https://httpbin.org/post?test=12345667788764" \
                    -H "Content-Type: application/json" \
                    -d '{"data":"12345667788764"}'

                  curl -s google.com

                  echo "Waiting a bit more..."
                  sleep 10

            - name: Print Docker Logs
              run: |
                  echo "Fetching docker logs..."
                  CONTAINER_ID=$(docker ps -aq --filter "ancestor=ecapture" | head -1)
                  if [ -n "$CONTAINER_ID" ]; then
                    echo "Found container: $CONTAINER_ID"
                    docker logs $CONTAINER_ID
                  else
                    echo "No running ecapture container found"
                  fi

            - name: Cleanup
              run: |
                  echo "The 'post' part of the 'Start ROC Agent' step will now run automatically to stop the roc process."
