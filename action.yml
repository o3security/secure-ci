name: "ROC Agent"
description: "Run ROC deep packet inspection tool in your Github Actions workflow"
author: "SecurableAI"

inputs:
    server_url:
        description: "Server URL for ROC"
        required: true
    api_key:
        description: "API Key for ROC"
        required: true
    patterns_file:
        description: "Patterns file for ROC"
        required: true
        default: "patterns.yaml"
    watch_dir:
        description: "Directory to watch"
        required: true
        default: "/tmp/roc-output"
    project_identifier:
        description: "Project identifier"
        required: true
    roc_binary_path:
        description: "Path to the ROC binary"
        required: false
        default: "./roc"
    setup_dependencies:
        description: "Install dependencies like tshark"
        required: false
        default: "true"

runs:
    using: "node20"
    main: "dist/index.js"
    post: "dist/post/index.js"

branding:
    icon: "shield"
    color: "blue"
