name: "ROC Agent"
description: "O3 Security ROC Agent — Runtime security and deep packet inspection for GitHub Actions"
author: "O3 Security"

inputs:
  # ── O3 Security dashboard (optional) ─────────────────────────────────────
  # Leave blank to run in open-source mode with inline policy below.
  api_key:
    description: "API key for O3 Security authentication (store in GitHub Secrets)"
    required: false
    default: ""
  server_url:
    description: "O3 Security API URL"
    required: false
    default: "https://api.codexsecurity.io/graphql"
  project_name:
    description: "Project name for grouping results in the O3 Security dashboard"
    required: false
    default: ""

  # ── Inline policy (open-source / no-dashboard mode) ───────────────────────
  # Configure egress policy without logging in to the O3 Security dashboard.
  # The action converts these inputs to a policy YAML file internally.
  policy:
    description: |
      Egress enforcement mode:
        audit  — monitor and log all outbound connections (default, safe)
        block  — drop TCP 80/443 connections not in the allowlist below
    required: false
    default: "audit"
  allowed_domains:
    description: |
      Allowed outbound domains when policy=block.
      One per line, or comma-separated. Supports host:port (e.g. api.github.com:443)
      and plain hostnames (allows both 80 and 443).
    required: false
    default: ""
  allowed_ips:
    description: |
      Allowed outbound IPs when policy=block.
      One per line, or comma-separated (e.g. 1.1.1.1).
    required: false
    default: ""
  allowed_cidrs:
    description: |
      Allowed outbound IP ranges when policy=block.
      One per line, or comma-separated CIDR notation (e.g. 10.0.0.0/8).
    required: false
    default: ""

  # ── Secret detection ──────────────────────────────────────────────────────
  patterns:
    description: |
      Secret scanning patterns. Accepts either:
        1. A file path:   .github/roc-patterns.yaml
        2. Inline YAML content (use | for multiline):
             - id: aws_key
               regex: 'AKIA[0-9A-Z]{16}'
             - id: github_token
               regex: 'ghp_[A-Za-z0-9]{36}'
    required: false

  # ── SIEM integration (optional) ───────────────────────────────────────────
  splunk_url:
    description: "Splunk HEC URL for direct SIEM integration"
    required: false
  splunk_token:
    description: "Splunk HEC token (store in GitHub Secrets)"
    required: false
  es_url:
    description: "Elasticsearch cluster URL"
    required: false
  es_index:
    description: "Elasticsearch index name"
    required: false
  es_user:
    description: "Elasticsearch username"
    required: false
  es_pass:
    description: "Elasticsearch password (store in GitHub Secrets)"
    required: false

  # ── Advanced ──────────────────────────────────────────────────────────────
  print_only:
    description: "Print captured events to stdout only — skip upload to O3 backend (useful for testing)"
    required: false
    default: "false"
  debug:
    description: "Enable verbose debug logging"
    required: false
    default: "false"
  docker_image:
    description: "Override the ROC Docker image (for air-gapped environments)"
    required: false
    default: "public.ecr.aws/f9o7b7m0/roc"
  baseline_enabled:
    description: "Enable automated egress baseline — flags new destinations not seen in previous runs (uses GitHub Actions Cache)"
    required: false
    default: "true"

outputs:
  roc_pid:
    description: "PID of the background ROC monitor process"

runs:
  using: "node20"
  main: "dist/index.js"
  post: "dist/post/index.js"

branding:
  icon: "shield"
  color: "blue"
